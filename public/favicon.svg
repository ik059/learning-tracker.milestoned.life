<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background rounded square - purple -->
  <rect width="100" height="100" rx="22" fill="#7C3AED"/>
  
  <!-- Progress bar 1 - full (top) -->
  <rect x="14" y="28" width="72" height="9" rx="4.5" fill="white" opacity="0.2"/>
  <rect x="14" y="28" width="72" height="9" rx="4.5" fill="white"/>
  <!-- milestone dot at end -->
  <circle cx="86" cy="32.5" r="7" fill="white"/>
  <circle cx="86" cy="32.5" r="3.5" fill="#7C3AED"/>

  <!-- Progress bar 2 - 70% (middle) -->
  <rect x="14" y="46" width="72" height="9" rx="4.5" fill="white" opacity="0.2"/>
  <rect x="14" y="46" width="50" height="9" rx="4.5" fill="white"/>

  <!-- Progress bar 3 - 40% (bottom) -->
  <rect x="14" y="64" width="72" height="9" rx="4.5" fill="white" opacity="0.2"/>
  <rect x="14" y="64" width="30" height="9" rx="4.5" fill="white"/>
</svg>
